                    appsettings.Development.json
      

# Deployment PROD
- stage: Production
  displayName: Deploy to Production
  dependsOn: 
    - BuildStage
    - QA    
  condition: |
    and
    (
      succeeded('BuildStage'),
      eq(variables['Build.SourceBranch'], 'refs/heads/master'),
      succeeded('QA')
    ) 
  jobs:
  - deployment: Deploy
    displayName: Deploy to Production
    environment: 'Production'
    pool:
      vmImage: $(HOST_POOL)
    variables:
      apiUrl: 'https://$(WebAppDeployStep.webApiURL)/api'
      tenant: '$(WebAppDeployStep.b2cTenant)'
      clientid: '$(WebAppDeployStep.b2cClientId)'
      redirectUri: '$(WebAppDeployStep.appRedirectUri)'
      buildTime: # will be set by script
    strategy:
      runOnce:
        deploy:
          steps:
            - task: PowerShell@2
              displayName: set variable buildTime
              inputs:
                targetType: 'inline'
                script: |
                  $date=$([DateTime]::UtcNow.ToString('u'));
                  Write-Host "##vso[task.setvariable variable=buildTime]$date"
            - task: AzureCLI@2
              displayName: Provision Web App from Bicep
              name: WebAppDeployStep
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_PROD)'
                scriptType: pscore
                scriptLocation: inlineScript
                inlineScript: |
                  az deployment group create -n ADOWebAppDeployment -f $(Pipeline.Workspace)/bicep/AzurePipelineTools/bicep/main.bicep  -p $(Pipeline.Workspace)/bicep/AzurePipelineTools/bicep/parameters.prod.json -g $(AZURE_RESOURCE_GROUP_PROD)
                  $WEBAPP_NAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.webAppName.value -o tsv)
                  $WEBAPP_APINAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.apiAppName.value -o tsv)                 
                  $WEBAPP_ADMINNAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.adminAppName.value -o tsv)
                  $WEB_URL=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.webURL.value -o tsv)
                  $WEB_API_URL=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.webApiURL.value -o tsv)
                  $WEB_ADMIN_URL=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.webAdminURL.value -o tsv)
                  $STORAGEACC_NAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.applicationStorageName.value -o tsv)
                  $SQL_FQDN=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.sqlServerFullyQualifiedDomainName.value -o tsv)
                  $DB_NAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.dbName.value -o tsv)
                  $B2CTENANT=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.b2cTenant.value -o tsv)
                  $B2CCLIENTID=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.b2cClientId.value -o tsv)
                  $REDIRECTURI=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_PROD) --query properties.outputs.appRedirectUri.value -o tsv) 
                
                  Write-Host "##vso[task.setvariable variable=webAppName;isOutput=true]$WEBAPP_NAME"         
                  Write-Host "##vso[task.setvariable variable=apiAppName;isOutput=true]$WEBAPP_APINAME"                
                  Write-Host "##vso[task.setvariable variable=adminAppName;isOutput=true]$WEBAPP_ADMINNAME"  
                  Write-Host "##vso[task.setvariable variable=webURL;isOutput=true]$WEB_URL"
                  Write-Host "##vso[task.setvariable variable=webApiURL;isOutput=true]$WEB_API_URL"                  
                  Write-Host "##vso[task.setvariable variable=webAdminURL;isOutput=true]$WEB_ADMIN_URL"                     
                  Write-Host "##vso[task.setvariable variable=applicationStorageName;isOutput=true]$STORAGEACC_NAME"   
                  Write-Host "##vso[task.setvariable variable=sqlFQDN;isOutput=true]$SQL_FQDN"  
                  Write-Host "##vso[task.setvariable variable=dbName;isOutput=true]$DB_NAME"    
                  Write-Host "##vso[task.setvariable variable=b2cTenant;isOutput=true]$B2CTENANT"
                  Write-Host "##vso[task.setvariable variable=b2cClientId;isOutput=true]$B2CCLIENTID"    
                  Write-Host "##vso[task.setvariable variable=appRedirectUri;isOutput=true]$REDIRECTURI" 

            - task: AzureCLI@2
              displayName: Retrieve Web App name
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_PROD)'
                scriptType: pscore
                scriptLocation: inlineScript
                inlineScript: |
                  Write-Host "Simple-Web App Provisioned: $(WebAppDeployStep.webAppName)"  
                  Write-Host "API App Provisioned: $(WebAppDeployStep.apiAppName)"                 
                  Write-Host "ADMIN App Provisioned: $(WebAppDeployStep.adminAppName)" 
                  Write-Host "Web URL: $(WebAppDeployStep.webURL)"
                  Write-Host "Web API URL: $(WebAppDeployStep.webApiURL)"                  
                  Write-Host "Web ADMIN URL: $(WebAppDeployStep.webAdminURL)"         
                  Write-Host "Storage Account Name: $(WebAppDeployStep.applicationStorageName)"  
                  Write-Host "SQL FQN: $(WebAppDeployStep.sqlFQDN)"
                  Write-Host "Database Name: $(WebAppDeployStep.dbName)"  
                  Write-Host "B2C Tenant : $(WebAppDeployStep.b2cTenant)"
                  Write-Host "B2C ClientId : $(WebAppDeployStep.b2cClientId)"
                  Write-Host "RedirectUri : $(WebAppDeployStep.appRedirectUri)"   

            - task: AzureCLI@2
              displayName: Deploy static B2C login files
              name: StaticFileDeploy
              inputs:
                azureSubscription: $(AZURE_CREDENTIALS_PROD)
                scriptType: pscore
                scriptLocation: inlineScript
                inlinescript: |                  
                  ls $(Pipeline.Workspace)/static_files/*.html -s | select fullname
                  az storage blob upload-batch --account-name $(WebAppDeployStep.applicationStorageName) --overwrite true --destination root --source $(Pipeline.Workspace)/static_files/static_files   

            - task: SqlAzureDacpacDeployment@1
              displayName: Create database user if not exists for API App Service 
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_PROD)'
                AuthenticationType: 'servicePrincipal'
                ServerName: $(WebAppDeployStep.sqlFQDN)
                DatabaseName: $(WebAppDeployStep.dbName)
                deployType: 'sqlTask'
                SqlFile: '$(Pipeline.Workspace)/bicep/AzurePipelineTools/bicep/modules/sql/create_user.sql'
                SqlAdditionalArguments: -Variable @("AppServiceName=$(WebAppDeployStep.apiAppName)") -verbose
                IpDetectionMethod: 'AutoDetect'

            - task: SqlAzureDacpacDeployment@1
              displayName: Create database user if not exists for Admin App Service 
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_PROD)'
                AuthenticationType: 'servicePrincipal'
                ServerName: $(WebAppDeployStep.sqlFQDN)
                DatabaseName: $(WebAppDeployStep.dbName)
                deployType: 'sqlTask'
                SqlFile: '$(Pipeline.Workspace)/bicep/AzurePipelineTools/bicep/modules/sql/create_user.sql'
                SqlAdditionalArguments: -Variable @("AppServiceName=$(WebAppDeployStep.adminAppName)") -verbose
                IpDetectionMethod: 'AutoDetect' 

            - task: ExtractFiles@1
              displayName: 'Extract zip archive '
              inputs:
                archiveFilePatterns: '$(Pipeline.Workspace)/Simple-web/*.zip'
                destinationFolder: '$(Pipeline.Workspace)/Simple-web/deploy'

            - task: qetza.replacetokens.replacetokens-task.replacetokens@3
              displayName: 'Replace tokens in main.*.js'            
              inputs:
                rootDirectory: '$(Pipeline.Workspace)/Simple-web/deploy/Simple-web'                
                targetFiles: 'main.*.js'
          
            - task: AzureWebApp@1
              displayName: 'Deploy Simple-web'
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_PROD)'
                appType: webApp
                appName: $(WebAppDeployStep.webAppName)
                package: '$(Pipeline.Workspace)/Simple-web/deploy/*'  
                TakeAppOfflineFlag: false
                RemoveAdditionalFilesFlag: true

            - task: AzureWebApp@1
              displayName: 'Deploy API'           
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_PROD)'
                appType: webApp
                appName: $(WebAppDeployStep.apiAppName)
                package: '$(Pipeline.Workspace)/API/*.zip'             
                JSONFiles: |
                    appsettings.json
                    appsettings.Development.json
            
            - task: AzureWebApp@1
              displayName: 'Deploy Admin'           
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_PROD)'
                appType: webApp
                appName: $(WebAppDeployStep.adminAppName)
                package: '$(Pipeline.Workspace)/ADMIN/*.zip'             
                JSONFiles: |
                    appsettings.json
                    appsettings.Development.json
      