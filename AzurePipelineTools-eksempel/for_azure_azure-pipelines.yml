# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
    - develop
    - master

name: <NAVN PÅ PIPELINE>

variables:
  #Common variables
  buildConfiguration: 'Release'

  #skipComponentGovernanceDetection: true #To avoid some internal warnings
  HOST_POOL: 'windows-latest'
  WORKINGDIRECTORY: '$(System.DefaultWorkingDirectory)/'
  
  #Dev environment variables - service connectin mangler
  AZURE_CREDENTIALS_DEV: 'HVI-UTVIKLING-DEV-ServiceConnection-SIMPLE' #her endrer du navn til den som ligger i ditt prosjekt
  AZURE_SUBSCRIPTION_ID_DEV: '470ca611-e54c-49b1-b5e5-07fcfb8c3c08' #skal ikke være nødvendig å endre
  AZURE_RESOURCE_GROUP_DEV: 'HVI-UTVIKLING-DEV-Simple-rg' #her endrer du til aktuell resource group 

  #QA environment variables - ikke satt opp  og mangler
  AZURE_CREDENTIALS_QA: 'HVI-UTVIKLING-QA-ServiceConnection-SIMPLE' #her endrer du navn til den som ligger i ditt prosjekt
  AZURE_SUBSCRIPTION_ID_QA: '387bb2d3-0a0b-47ba-84a6-225535b77763' #skal ikke være nødvendig å endre
  AZURE_RESOURCE_GROUP_QA: 'HVI-UTVIKLING-QA-Simple-rg' #her endrer du til aktuell resource group 

  #PROD environment variables
  AZURE_CREDENTIALS_PROD: 'HVI-UTVIKLING-PROD-ServiceConnection-SIMPLE' #her endrer du navn til den som ligger i ditt prosjekt
  AZURE_SUBSCRIPTION_ID_PROD: 'fc1fa7c8-2924-42a9-a988-c2944d8db9e3' #skal ikke være nødvendig å endre
  AZURE_RESOURCE_GROUP_PROD: 'HVI-UTVIKLING-PROD-Simple-rg' #her endrer du til aktuell resource group 

#Build stage
stages:
- stage: BuildStage
  displayName: Build
  jobs:
  - job: CopyBicepFiles
    displayName: 'Copy Bicep files'
    pool: 
      vmImage: 'windows-latest'

    steps:   

    - checkout: self
      clean: true

    - task:  CopyFiles@2
      displayName: 'Copy Bicep Templates'
      inputs:
        sourceFolder: '$(System.DefaultWorkingDirectory)/AzurePipelineTools/bicep'        
        targetFolder: '$(Build.ArtifactStagingDirectory)/AzurePipelineTools/bicep'      

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifacts Bicep'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'bicep'
        publishLocation: 'pipeline'

#om du har b2c login og egen template
  - job: CopyLoginFiles
    displayName: 'Copy login files'
    pool: 
      vmImage: 'windows-latest'

    steps:
      - task:  CopyFiles@2
        displayName: 'Copy login template'
        inputs:
          sourceFolder: '$(System.DefaultWorkingDirectory)/static_files'        
          targetFolder: '$(Build.ArtifactStagingDirectory)/static_files' 

      - task: PublishPipelineArtifact@1
        displayName: 'Publish login template'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifact: 'static_files'
          publishLocation: 'pipeline'
#
# TODO ved nye prosjekter: justere etter behov, navn og plassering pr prosjekt må endres herfra og ned
#
  - job: SimpleWeb    
    displayName: 'Build Simple-web'
    pool:
      vmImage: 'windows-latest'
  
    steps:
    
    - task: NodeTool@0
      displayName: 'Use Node 14'
      inputs:
        versionSpec: 14.x

    - task: Npm@1
      displayName: 'install angular cli'
      inputs:
        command: custom
        workingDir: 'Simple-web'
        verbose: false
        customCommand: 'install @angular/cli --force'

    - task: Npm@1
      displayName: 'npm install'
      inputs:
        workingDir: 'Simple-web'
        verbose: false

    - task: RaulARuiz.angular-cli-1.angular-cli-build-task.AngularCLI@1
      displayName: 'ng build frontend'
      inputs:
        command: custom
        project: 'Simple-web'
        custom: 'build --configuration production'

    - task: Npm@0
      displayName: npm install express
      inputs:
        cwd: Simple-web/dist/Simple-web

    - task: ArchiveFiles@2
      displayName: 'Archive Simple-web/dist/Simple-web'
      inputs:
        rootFolderOrFile: 'Simple-web/dist/Simple-web'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifacts'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'Simple-web'
        publishLocation: 'pipeline'

  - job: API    
    displayName: 'Build Simple-API'
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: UseDotNet@2
      displayName: Use .NET 6.0
      inputs:
        packageType: 'sdk'
        version: '6.0.x'
    
    - task: DotNetCoreCLI@2
      displayName: Build and Publish web app API
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/API.csproj'
        inlineScript: |
                  Write-Host "WorkingDirectory: $(Build.ArtifactStagingDirectory)"
        arguments: -o $(Build.ArtifactStagingDirectory) --configuration Release
        zipAfterPublish: true
    
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifacts API'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'API'
        publishLocation: 'pipeline'
        
  - job: Admin   
    displayName: 'Build Simple-Admin'
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: UseDotNet@2
      displayName: Use .NET 6.0
      inputs:
        packageType: 'sdk'
        version: '6.0.x'

    - task: DotNetCoreCLI@2
      displayName: 'Build and Publish Admin'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/Admin.csproj'
        inlineScript: |
                  Write-Host "WorkingDirectory: $(Build.ArtifactStagingDirectory)"
        arguments: -o $(Build.ArtifactStagingDirectory) --configuration Release
        zipAfterPublish: true

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifacts Admin'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'Admin'
        publishLocation: 'pipeline'

  # - job: Test   
  #   displayName: 'Test Simple'
  #   pool:
  #     vmImage: 'windows-latest'
  #   steps:
  #   - task: UseDotNet@2
  #     displayName: Use .NET 6.0
  #     inputs:
  #       packageType: 'sdk'
  #       version: '6.0.x'

  #   - task: DotNetCoreCLI@2
  #     displayName: 'Test'
  #     inputs:
  #       command: 'test'
  #       publishWebProjects: false
  #       projects: '**/Test.csproj'

# Dev-Deployment stage
#This block below can be repeated for Test, Acceptance, Production deployments
- stage: Development
  displayName: Deploy to Development
  dependsOn: BuildStage
  condition: |
    and
    (
      succeeded('BuildStage'),
      eq(variables['Build.SourceBranch'], 'refs/heads/develop')
    )  
  jobs:
  - deployment: Deploy
    displayName: Deploy to Development
    environment: 'Development'
    pool:
      vmImage: $(HOST_POOL)
    variables:
      apiUrl: 'https://$(WebAppDeployStep.webApiURL)/api'
      tenant: '$(WebAppDeployStep.b2cTenant)'
      clientid: '$(WebAppDeployStep.b2cClientId)'
      redirectUri: '$(WebAppDeployStep.appRedirectUri)'
      buildTime: # will be set by script
    strategy:
      runOnce:
        deploy:
          steps:
            - task: PowerShell@2
              displayName: set variable buildTime
              inputs:
                targetType: 'inline'
                script: |
                  $date=$([DateTime]::UtcNow.ToString('u'));
                  Write-Host "##vso[task.setvariable variable=buildTime]$date"
            - task: AzureCLI@2
              displayName: Provision Web Apps from Bicep
              name: WebAppDeployStep
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_DEV)'
                scriptType: pscore
                scriptLocation: inlineScript
                inlineScript: |
                  az deployment group create -n ADOWebAppDeployment -f $(Pipeline.Workspace)/bicep/AzurePipelineTools/bicep/main.bicep  -p $(Pipeline.Workspace)/bicep/AzurePipelineTools/bicep/parameters.dev.json -g $(AZURE_RESOURCE_GROUP_DEV)
                  $WEBAPP_NAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.webAppName.value -o tsv)
                  $WEBAPP_APINAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.apiAppName.value -o tsv)                 
                  $WEBAPP_ADMINNAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.adminAppName.value -o tsv)  
                  $WEB_URL=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.webURL.value -o tsv)
                  $WEB_API_URL=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.webApiURL.value -o tsv)
                  $WEB_ADMIN_URL=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.webAdminURL.value -o tsv)
                  $STORAGEACC_NAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.applicationStorageName.value -o tsv)
                  $SQL_FQDN=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.sqlServerFullyQualifiedDomainName.value -o tsv)
                  $DB_NAME=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.dbName.value -o tsv)
                  $B2CTENANT=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.b2cTenant.value -o tsv)
                  $B2CCLIENTID=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.b2cClientId.value -o tsv)
                  $REDIRECTURI=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_DEV) --query properties.outputs.appRedirectUri.value -o tsv)

                  Write-Host "##vso[task.setvariable variable=webAppName;isOutput=true]$WEBAPP_NAME"         
                  Write-Host "##vso[task.setvariable variable=apiAppName;isOutput=true]$WEBAPP_APINAME"                
                  Write-Host "##vso[task.setvariable variable=adminAppName;isOutput=true]$WEBAPP_ADMINNAME" 
                  Write-Host "##vso[task.setvariable variable=webURL;isOutput=true]$WEB_URL"
                  Write-Host "##vso[task.setvariable variable=webApiURL;isOutput=true]$WEB_API_URL"   
                  Write-Host "##vso[task.setvariable variable=webAdminURL;isOutput=true]$WEB_ADMIN_URL" 
                  Write-Host "##vso[task.setvariable variable=applicationStorageName;isOutput=true]$STORAGEACC_NAME"   
                  Write-Host "##vso[task.setvariable variable=sqlFQDN;isOutput=true]$SQL_FQDN"  
                  Write-Host "##vso[task.setvariable variable=dbName;isOutput=true]$DB_NAME"     
                  Write-Host "##vso[task.setvariable variable=b2cTenant;isOutput=true]$B2CTENANT"
                  Write-Host "##vso[task.setvariable variable=b2cClientId;isOutput=true]$B2CCLIENTID"  
                  Write-Host "##vso[task.setvariable variable=appRedirectUri;isOutput=true]$REDIRECTURI"          

            - task: AzureCLI@2
              displayName: Retrieve Web Apps and variable names
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_DEV)'
                scriptType: pscore
                scriptLocation: inlineScript
                inlineScript: |
                  Write-Host "Simple-Web App Provisioned: $(WebAppDeployStep.webAppName)"  
                  Write-Host "API App Provisioned: $(WebAppDeployStep.apiAppName)"                 
                  Write-Host "ADMIN App Provisioned: $(WebAppDeployStep.adminAppName)" 
                  Write-Host "Web URL: $(WebAppDeployStep.webURL)"
                  Write-Host "Web API URL: $(WebAppDeployStep.webApiURL)"                  
                  Write-Host "Web ADMIN URL: $(WebAppDeployStep.webAdminURL)" 
                  Write-Host "Storage Account Name: $(WebAppDeployStep.applicationStorageName)"  
                  Write-Host "SQL FQN: $(WebAppDeployStep.sqlFQDN)"
                  Write-Host "Database Name: $(WebAppDeployStep.dbName)"
                  Write-Host "B2C Tenant : $(WebAppDeployStep.b2cTenant)"
                  Write-Host "B2C ClientId : $(WebAppDeployStep.b2cClientId)"
                  Write-Host "RedirectUri : $(WebAppDeployStep.appRedirectUri)"
            
            - task: AzureCLI@2
              displayName: Deploy static B2C login files
              name: StaticFileDeploy
              inputs:
                azureSubscription: $(AZURE_CREDENTIALS_DEV)
                scriptType: pscore
                scriptLocation: inlineScript
                inlinescript: |                  
                  ls $(Pipeline.Workspace)/static_files/*.html -s | select fullname
                  az storage blob upload-batch --account-name $(WebAppDeployStep.applicationStorageName) --overwrite true --destination root --source $(Pipeline.Workspace)/static_files/static_files                  

            - task: SqlAzureDacpacDeployment@1
              displayName: Create database user if not exists for API App Service 
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_DEV)'
                AuthenticationType: 'servicePrincipal'
                ServerName: $(WebAppDeployStep.sqlFQDN)
                DatabaseName: $(WebAppDeployStep.dbName)
                deployType: 'sqlTask'
                SqlFile: '$(Pipeline.Workspace)/bicep/AzurePipelineTools/bicep/modules/sql/create_user.sql'
                SqlAdditionalArguments: -Variable @("AppServiceName=$(WebAppDeployStep.apiAppName)") -verbose
                IpDetectionMethod: 'AutoDetect' 

            - task: SqlAzureDacpacDeployment@1
              displayName: Create database user if not exists for Admin App Service 
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_DEV)'
                AuthenticationType: 'servicePrincipal'
                ServerName: $(WebAppDeployStep.sqlFQDN)
                DatabaseName: $(WebAppDeployStep.dbName)
                deployType: 'sqlTask'
                SqlFile: '$(Pipeline.Workspace)/bicep/AzurePipelineTools/bicep/modules/sql/create_user.sql'
                SqlAdditionalArguments: -Variable @("AppServiceName=$(WebAppDeployStep.adminAppName)") -verbose
                IpDetectionMethod: 'AutoDetect' 

            - task: ExtractFiles@1
              displayName: 'Extract zip archive '
              inputs:
                archiveFilePatterns: '$(Pipeline.Workspace)/Simple-web/*.zip'
                destinationFolder: '$(Pipeline.Workspace)/Simple-web/deploy'

            - task: qetza.replacetokens.replacetokens-task.replacetokens@3
              displayName: 'Replace tokens in main.*.js'            
              inputs:
                rootDirectory: '$(Pipeline.Workspace)/Simple-web/deploy/Simple-web'                
                targetFiles: 'main.*.js'
          
            - task: AzureWebApp@1
              displayName: 'Deploy Simple-web'
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_DEV)'
                appType: webApp
                appName: $(WebAppDeployStep.webAppName)
                package: '$(Pipeline.Workspace)/Simple-web/deploy/*'  
                TakeAppOfflineFlag: false
                RemoveAdditionalFilesFlag: true

            - task: AzureWebApp@1
              displayName: 'Deploy API'           
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_DEV)'
                appType: webApp
                appName: $(WebAppDeployStep.apiAppName)
                package: '$(Pipeline.Workspace)/API/*.zip'             
                JSONFiles: |
                    appsettings.json
                    appsettings.Development.json
            - task: AzureWebApp@1
              displayName: 'Deploy Admin'           
              inputs:
                azureSubscription: '$(AZURE_CREDENTIALS_DEV)'
                appType: webApp
                appName: $(WebAppDeployStep.adminAppName)
                package: '$(Pipeline.Workspace)/ADMIN/*.zip'             
                JSONFiles: |
                    appsettings.json
                    appsettings.Development.json


            
# QA-Deployment stage
- stage: QA
  displayName: Deploy to QA
  dependsOn: BuildStage
  condition: |
    and
    (
      succeeded('BuildStage'),
      eq(variables['Build.SourceBranch'], 'refs/heads/master')
    )  
  jobs:
  - deployment: Deploy
    displayName: Deploy to QA
    environment: 'QA'
    pool:
      vmImage: $(HOST_POOL)
    variables:
      apiUrl: 'https://$(WebAppDeployStep.webApiURL)/api'
      tenant: '$(WebAppDeployStep.b2cTenant)'
      clientid: '$(WebAppDeployStep.b2cClientId)'
      redirectUri: '$(WebAppDeployStep.appRedirectUri)'
      buildTime: # will be set by script
    strategy:
      runOnce:
        deploy:
