                  $B2CCLIENTID=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_QA) --query properties.outputs.b2cClientId.value -o tsv)   
                  $REDIRECTURI=(az deployment group show -n ADOWebAppDeployment -g $(AZURE_RESOURCE_GROUP_QA) --query properties.outputs.appRedirectUri.value -o tsv)
                
                  Write-Host "##vso[task.setvariable variable=webAppName;isOutput=true]$WEBAPP_NAME"         
                  Write-Host "##vso[task.setvariable variable=apiAppName;isOutput=true]$WEBAPP_APINAME"                
                  Write-Host "##vso[task.setvariable variable=adminAppName;isOutput=true]$WEBAPP_ADMINNAME"  
